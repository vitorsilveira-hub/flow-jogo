<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow: Sem Filtro - PC MASTER</title>
    <style>
        :root { --bg: #000; --red: #ff0000; --wine: #4a0000; --gold: #D4AF37; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        
        /* AJUSTE PARA PC: Removi o limite de 450px */
        .screen { display: none; width: 90%; max-width: 1200px; flex-direction: column; gap: 20px; }
        .active { display: flex; }
        
        h1 { color: var(--red); font-size: 3rem; letter-spacing: 5px; margin: 0; text-shadow: 0 0 15px var(--red); }
        h2 { color: var(--gold); font-size: 1.8rem; margin: 0; }
        p { font-size: 2.2rem; font-weight: bold; line-height: 1.2; margin: 20px 0; color: #eee; }
        
        .btn { background: var(--wine); color: #fff; border: 1px solid var(--red); padding: 25px; font-size: 1.5rem; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--red); box-shadow: 0 0 20px var(--red); }
        
        .timer { font-size: 8rem; color: var(--red); margin: 10px 0; font-family: monospace; text-shadow: 0 0 20px var(--red); }
        
        .rating-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 100%; max-width: 800px; align-self: center; }
        .btn-note { background: #1a1a1a; border: 1px solid var(--gold); color: var(--gold); padding: 20px; font-size: 2rem; border-radius: 10px; }
        
        .status { font-size: 1.2rem; color: #666; text-transform: uppercase; display: flex; justify-content: space-between; width: 100%; padding: 20px; position: absolute; top: 0; }
        .btn-top { background: transparent; border: 1px solid #444; color: #888; padding: 10px 15px; font-size: 1rem; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        
        .name-input { background: #111; border: 2px solid var(--gold); color: #fff; padding: 15px; font-size: 1.5rem; width: 300px; text-align: center; border-radius: 10px; }
        input[type="number"], select { background: #222; border: 1px solid var(--red); color: #fff; padding: 10px; font-size: 1.5rem; text-align: center; }
        .row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 20px; border-radius: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="status">
        <div id="status-left"><span id="l-lv">Nível 1</span> | <span id="l-tr">Vez de...</span></div>
        <div style="display:flex;">
            <button class="btn-top" onclick="toggleFullScreen()">Tela Cheia (F11)</button>
            <button class="btn-top" onclick="skipLevel()">Pular Nível</button>
            <button class="btn-top" onclick="exitToHome()">Sair</button>
        </div>
    </div>

    <div id="s-start" class="screen active">
        <h1>FLOW: SEM FILTRO</h1>
        <div style="display:flex; gap:20px; justify-content:center; margin: 20px 0;">
            <input type="text" id="p1" class="name-input" placeholder="Nome Dele">
            <input type="text" id="p2" class="name-input" placeholder="Nome Dela">
        </div>
        <button class="btn" onclick="show('s-settings')">Ajustar Tempo</button>
        <button class="btn" style="margin-top:10px; border-color: var(--gold);" onclick="start()">Entrar no Jogo</button>
    </div>

    <div id="s-settings" class="screen">
        <h2>Ajustes Globais</h2>
        <div class="row"><label>Mínimo (seg):</label><input type="number" id="c-min" value="120"></div>
        <div class="row"><label>Máximo (seg):</label><input type="number" id="c-max" value="300"></div>
        <div class="row"><label>Bônus por Nível (seg):</label><select id="c-inc"><option value="0">Off</option><option value="30" selected>+30s</option><option value="60">+60s</option></select></div>
        <button class="btn" onclick="saveSettings()">Salvar Configurações</button>
    </div>

    <div id="s-game" class="screen">
        <h2 id="l-who" style="color:var(--gold); font-size: 2.5rem;">Ação</h2>
        <p id="l-txt">Sorteando...</p>
        <div class="timer" id="l-tm">00:00</div>
        <button id="b-run" class="btn" onclick="runTimer()">Começar Ato</button>
        <button id="b-rate" class="btn" style="display:none;" onclick="showRate()">Avaliar Agora</button>
        <button id="b-skip" class="btn" style="background:#333; border:none; margin-top:20px; font-size: 1rem;" onclick="skipAction()">Pular esta Ação</button>
    </div>

    <div id="s-rate" class="screen">
        <h2 id="l-rate-msg" style="font-size: 2rem;">Nota:</h2>
        <div class="rating-grid" id="notes"></div>
        <p style="font-size:1.5rem">Média do Nível: <span id="l-av">0</span></p>
    </div>

        <p>Prepare-se para o próximo passo...</p>
        <button class="btn" onclick="nextLevel()">Avançar</button>
    </div>

        let state = { lv: 1, p1: 'ELE', p2: 'ELA', tr: 'ele', nts: [], acts: 0, min: 120, max: 300, inc: 30 };
        let timer;

        function save() { localStorage.setItem('flow_pc_v1', JSON.stringify(state)); }
        function load() { 
            const v = localStorage.getItem('flow_pc_v1'); 
            if(v) { 
                state = JSON.parse(v); 
                document.getElementById('p1').value = state.p1;
                document.getElementById('p2').value = state.p2;
                document.getElementById('c-min').value = state.min; 
                document.getElementById('c-max').value = state.max; 
                document.getElementById('c-inc').value = state.inc; 
            } 
        }

        function show(id) { document.querySelectorAll('.screen').forEach(x => x.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function saveSettings() { 
            state.min = parseInt(document.getElementById('c-min').value); 
            state.max = parseInt(document.getElementById('c-max').value); 
            state.inc = parseInt(document.getElementById('c-inc').value); 
            save(); show('s-start'); 
        }
        function start() { 
            state.p1 = document.getElementById('p1').value || 'ELE';
            state.p2 = document.getElementById('p2').value || 'ELA';
            save(); initLv(); 
        }
        function initLv() { state.acts = 0; state.nts = []; update(); draw(); show('s-game'); }
        function skipLevel() { if(state.lv < 10) { if(confirm("Avançar para o próximo nível?")) { state.lv++; save(); show('s-up'); } } }
        function nextLevel() { initLv(); }
        function update() { 
            document.getElementById('l-lv').innerText = `Nível ${state.lv}`; 
            document.getElementById('l-tr').innerText = `Vez de: ${state.tr === 'ele' ? state.p1 : state.p2}`; 
            const m = state.nts.length ? (state.nts.reduce((a,b)=>a+b)/s.nts.length).toFixed(1) : 0; 
        }
        function draw() { 
            clearInterval(timer);
            document.getElementById('b-run').style.display = 'block'; 
            document.getElementById('b-rate').style.display = 'none'; 
            document.getElementById('b-skip').style.display = 'block'; 
            document.getElementById('l-tm').innerText = "00:00"; 
            const l = db[state.lv][state.tr]; 
            document.getElementById('l-txt').innerText = l[Math.floor(Math.random() * l.length)]; 
            document.getElementById('l-who').innerText = state.tr === 'ele' ? `${state.p1} FAZ EM ${state.p2}` : `${state.p2} FAZ EM ${state.p1}`; 
        }
        function runTimer() {
            document.getElementById('b-run').style.display = 'none';
            document.getElementById('b-skip').style.display = 'none';
            let bonus = (state.lv - 1) * state.inc;
            let mS = state.min + bonus, MS = state.max + bonus;
            let sec = Math.floor(Math.random() * (MS - mS + 1)) + mS;
            timer = setInterval(() => {
                sec--;
                let min = Math.floor(sec / 60); let remSec = sec % 60;
                document.getElementById('l-tm').innerText = `${min.toString().padStart(2, '0')}:${remSec.toString().padStart(2, '0')}`;
                if(sec <= 0) { clearInterval(timer); document.getElementById('b-rate').style.display = 'block'; }
            }, 1000);
        }
        function skipAction() { if(confirm("Pular?")) { state.tr = (state.tr === 'ele' ? 'ela' : 'ele'); save(); update(); draw(); } }
        function exitToHome() { clearInterval(timer); show('s-start'); }
        function showRate() {
            document.getElementById('l-rate-msg').innerText = `Nota de ${state.tr === 'ele' ? state.p2 : state.p1}:`;
            show('s-rate'); 
            const g = document.getElementById('notes'); g.innerHTML = '';
            for(let i=1; i<=10; i++) {
                let b = document.createElement('button'); b.className = 'btn-note'; b.innerText = i;
                b.onclick = () => recordRating(i); g.appendChild(b);
            }
        }
        function recordRating(nota) {
            state.nts.push(nota); state.acts++;
            const media = state.nts.reduce((a,b)=>a+b)/state.nts.length;
            state.tr = (state.tr === 'ele' ? 'ela' : 'ele');
            if(state.acts >= 4 && media >= 8.5 && state.lv < 10) { state.lv++; save(); show('s-up'); } 
            else { save(); update(); draw(); show('s-game'); }
        }
        function reset() { if(confirm("Resetar?")) { localStorage.removeItem('flow_pc_v1'); location.reload(); } }
        window.onload = load;
    </script>
</body>
</html>
